# Re-run the updater whenever code under specific directories changes on the
# default branch. Useful for keeping AGENTS.md in sync with structural changes.
name: Update AGENTS.md (on push)

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "packages/**"
      - "apps/**"
      - "package.json"
      - "pyproject.toml"
      - "Cargo.toml"
      - "go.mod"

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    uses: sheepbox8646/agents-md-updater/.github/workflows/update-agents-md.yml@main
    with:
      agent: claude
      target_files: AGENTS.md,CLAUDE.md
      directories: |
        .
        packages
        apps
      output_mode: pr
      extra_instructions: |
        - Pay special attention to additions or removals under packages/ and apps/.
        - Update root AGENTS.md only if the monorepo structure changed.
    secrets:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      # or use an OAuth token (Pro/Max plans) instead of an API key:
      # CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
